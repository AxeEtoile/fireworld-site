<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🔥 FireWorld</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#0f0f0f;
}

#map { height:100vh; }

/* ===== BARRE ===== */
.topbar {
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    display:flex;
    background:white;
    border-radius:50px;
    padding:6px;
    z-index:1000;
    box-shadow:0 4px 20px rgba(0,0,0,0.25);
}

.topbar input {
    flex:1;
    border:none;
    outline:none;
    padding:10px;
    font-size:16px;
    border-radius:50px;
}

/* ===== MICRO ===== */
.mic-btn {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#f1f3f4;
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    cursor:pointer;
}

/* ===== SLIDER ===== */
.zoomWrapper {
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    height:65%;
    display:flex;
    align-items:center;
    z-index:1000;
}

.zoomIcons {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:100%;
    margin-right:10px;
    font-size:18px;
}

/* zone tactile large */
.zoomSlider {
    -webkit-appearance:none;
    appearance:none;
    width:30px;
    height:100%;
    background:transparent;
    outline:none;
    cursor:pointer;
}

/* barre */
.zoomSlider::-webkit-slider-runnable-track {
    width:6px;
    height:100%;
    margin:auto;
    border-radius:50px;
    background:linear-gradient(to top, #ff4d00, #ffaa00, #00ff88);
}

/* rond */
.zoomSlider::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
    border:3px solid #ff4d00;
    box-shadow:0 3px 8px rgba(0,0,0,0.4);
    cursor:pointer;
}

/* firefox */
.zoomSlider::-moz-range-track {
    width:6px;
    border-radius:50px;
    background:linear-gradient(to top, #ff4d00, #ffaa00, #00ff88);
}

.zoomSlider::-moz-range-thumb {
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
    border:3px solid #ff4d00;
}

/* ===== BOUTON ===== */
.fireBtn {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
}
</style>
</head>

<body>

<!-- BARRE -->
<div class="topbar">
    <input id="search" placeholder="Rechercher un lieu...">
    <button onclick="startVoice()" class="mic-btn">🎤</button>
</div>

<!-- SLIDER -->
<div class="zoomWrapper">
    <div class="zoomIcons">
        <div>🌍</div>
        <div>🌐</div>
        <div>🗺️</div>
        <div>📍</div>
        <div>🏙️</div>
    </div>

    <input type="range" min="1" max="5" value="3" id="zoomLevel" class="zoomSlider">
</div>

<button class="fireBtn" onclick="loadFires()">🔥 Feux en direct</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://fireworld-api.onrender.com/feux";

let map = L.map('map').setView([46.6, 2.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

/* ZOOM STABLE */
const zoomMap = {
    1:2,
    2:5,
    3:8,
    4:11,
    5:14
};

document.getElementById("zoomLevel").addEventListener("input", function(){
    map.setZoom(zoomMap[this.value]);
});

/* SEARCH */
async function searchCity(){
    let query = document.getElementById("search").value;

    let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
    let data = await res.json();

    if(data.length > 0){
        map.setView([data[0].lat, data[0].lon], zoomMap[document.getElementById("zoomLevel").value]);
    }
}

document.getElementById("search").addEventListener("keydown", function(e){
    if(e.key === "Enter") searchCity();
});

/* MICRO */
function startVoice(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "fr-FR";

    recognition.onresult = function(e){
        let text = e.results[0][0].transcript;
        document.getElementById("search").value = text;
        searchCity();
    };

    recognition.start();
}

/* FEUX */
async function loadFires(){

    clearMap();

    let res = await fetch(API_URL);
    let text = await res.text();

    let rows = text.split("\n").slice(1);

    rows.forEach(row => {

        let cols = row.split(",");

        let lat = parseFloat(cols[0]);
        let lon = parseFloat(cols[1]);
        let bright = parseFloat(cols[2]);

        if(!lat || !lon) return;

        let color =
            bright > 350 ? "#ff0000" :
            bright > 320 ? "#ff8800" :
            bright > 300 ? "#ffd000" : "#00ff88";

        let marker = L.circleMarker([lat, lon], {
            radius:5,
            color:color,
            fillOpacity:0.8
        }).addTo(map);

        marker.bindPopup(`🔥 Intensité : ${bright}`);

        markers.push(marker);
    });
}

/* RESET */
function clearMap(){
    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

</script>

</body>
</html>
