<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🔥 FireWorld</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#0f0f0f;
}

#map { height:100vh; }

/* ===== BARRE RECHERCHE ===== */
.topbar {
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    display:flex;
    background:white;
    border-radius:30px;
    padding:6px;
    z-index:1000;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.topbar input {
    flex:1;
    border:none;
    outline:none;
    padding:10px;
    font-size:16px;
    border-radius:30px;
}

/* ===== MICRO PRO ===== */
.mic-btn {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#f1f3f4;
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.mic-btn:hover {
    background:#e0e0e0;
}

.mic-btn svg {
    width:20px;
    height:20px;
    stroke:#202124;
    fill:none;
    stroke-width:2;
}

/* ===== SLIDER VERTICAL ===== */
.zoomControl {
    position:absolute;
    right:15px;
    top:120px;
    height:250px;
    display:flex;
    align-items:center;
    z-index:1000;
}

.labels {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    margin-right:10px;
    color:white;
    font-size:12px;
}

.verticalSlider {
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
    width:30px;
    height:250px;
    cursor:pointer;
}

/* ===== BOUTON FEUX ===== */
.fireBtn {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
}
</style>
</head>

<body>

<!-- BARRE -->
<div class="topbar">
    <input id="search" placeholder="Rechercher un lieu...">
    <button onclick="startVoice()" class="mic-btn">
        <svg viewBox="0 0 24 24">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zM12 19v3m-4 0h8"/>
        </svg>
    </button>
</div>

<!-- SLIDER -->
<div class="zoomControl">
    <div class="labels">
        <span>Monde</span>
        <span>Pays</span>
        <span>Région</span>
        <span>Département</span>
        <span>Ville</span>
    </div>

    <input type="range" min="1" max="5" value="3" id="zoomLevel" class="verticalSlider">
</div>

<!-- BOUTON -->
<button class="fireBtn" onclick="loadFires()">🔥 Afficher les feux</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://fireworld-api.onrender.com/feux";

let map = L.map('map').setView([46.6, 2.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

// ===== ZOOM =====
function getZoom(){
    const zooms = [2,5,8,11,14];
    return zooms[document.getElementById("zoomLevel").value - 1];
}

// slider live zoom
document.getElementById("zoomLevel").oninput = function(){
    map.setZoom(getZoom());
};

// ===== SEARCH =====
async function searchCity(){
    let query = document.getElementById("search").value;

    let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
    let data = await res.json();

    if(data.length > 0){
        map.setView([data[0].lat, data[0].lon], getZoom());
    }
}

// enter = recherche
document.getElementById("search").addEventListener("keydown", function(e){
    if(e.key === "Enter") searchCity();
});

// ===== MICRO =====
function startVoice(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "fr-FR";

    recognition.onresult = function(e){
        let text = e.results[0][0].transcript;
        document.getElementById("search").value = text;
        searchCity();
    };

    recognition.start();
}

// ===== FEUX =====
async function loadFires(){

    clearMap();

    let res = await fetch(API_URL);
    let text = await res.text();

    let rows = text.split("\n").slice(1);

    rows.forEach(row => {

        let cols = row.split(",");

        let lat = parseFloat(cols[0]);
        let lon = parseFloat(cols[1]);
        let bright = parseFloat(cols[2]);

        if(!lat || !lon) return;

        let color =
            bright > 350 ? "#ff0000" :
            bright > 320 ? "#ff8800" :
            bright > 300 ? "#ffd000" : "#00ff88";

        let marker = L.circleMarker([lat, lon], {
            radius:5,
            color:color,
            fillOpacity:0.8
        }).addTo(map);

        marker.bindPopup(`
            🔥 Feu détecté<br>
            Intensité : ${bright}
        `);

        markers.push(marker);
    });
}

// ===== RESET =====
function clearMap(){
    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

</script>

</body>
</html>
</script>

</body>
</html>
