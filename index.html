<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🔥 FireWorld</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f0f0f;
    overflow:hidden;
}

#map{
    height:100vh;
    width:100%;
}

/* BARRE RECHERCHE */
.topbar{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    display:flex;
    background:white;
    border-radius:50px;
    padding:6px;
    z-index:1000;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
}

.topbar input{
    flex:1;
    border:none;
    outline:none;
    padding:10px;
    font-size:16px;
    border-radius:50px;
}

/* MICRO */
.mic-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#f1f3f4;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.mic-btn svg{
    width:20px;
    height:20px;
    stroke:#202124;
    stroke-width:2;
    fill:none;
}

/* SUGGESTIONS */
.suggestions{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    width:85%;
    background:white;
    border-radius:15px;
    max-height:250px;
    overflow:auto;
    z-index:1000;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
}

.suggestionItem{
    padding:10px;
    cursor:pointer;
}

.suggestionItem:hover{
    background:#eee;
}

/* MENU */
.menuWrapper{
    position:absolute;
    top:15px;
    right:20px;
    z-index:1000;
}

.menuBtn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:28px;
    line-height:20px;
    cursor:pointer;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
}

.menuBox{
    display:none;
    position:absolute;
    right:0;
    top:55px;
    background:white;
    padding:8px;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
}

.menuBox button{
    width:170px;
    padding:12px;
    border:none;
    background:white;
    border-radius:10px;
    cursor:pointer;
    text-align:left;
    font-size:15px;
}

.menuBox button:hover{
    background:#eee;
}

/* SLIDER */
.zoomWrapper{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    height:65%;
    z-index:1000;
}

.sliderTrack{
    width:10px;
    height:100%;
    background:rgba(255,255,255,.85);
    border-radius:50px;
    box-shadow:0 0 12px white;
    position:relative;
}

.sliderThumb{
    width:24px;
    height:24px;
    border-radius:50%;
    background:#ff5722;
    border:3px solid white;
    position:absolute;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    box-shadow:
    0 0 12px rgba(255,87,34,.9),
    0 4px 15px rgba(0,0,0,.7);
}

/* BOUTON FEUX */
.fireBtn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
}
</style>

</head>

<body>

<div class="topbar">
<input id="search" placeholder="Rechercher un lieu...">

<button onclick="startVoice()" class="mic-btn">
<svg viewBox="0 0 24 24">
<rect x="8" y="3" width="8" height="12" rx="4"></rect>
<path d="M5 11a7 7 0 0 0 14 0"></path>
<path d="M12 18v3"></path>
</svg>
</button>
</div>

<div id="suggestions" class="suggestions"></div>


<div class="menuWrapper">

<button class="menuBtn" onclick="toggleMenu()">
⋮
</button>

<div class="menuBox" id="menuBox">

<button onclick="setSatellite()">
🛰️ Vue satellite
</button>

<button onclick="setMapView()">
🗺️ Vue carte
</button>

</div>

</div>


<div class="zoomWrapper">

<div class="sliderTrack" id="sliderTrack">
<div class="sliderThumb" id="sliderThumb"></div>
</div>

</div>


<button class="fireBtn" onclick="loadFires()">
🔥 Feux en direct
</button>


<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

const API_URL="https://fireworld-api.onrender.com/feux";

/* COUCHES */
const streetLayer=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:"© OpenStreetMap"
}
);

const satelliteLayer=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);


/* CARTE */

let map=L.map('map',{
    zoomControl:false,
    zoomSnap:0,
    zoomDelta:0.1,
    wheelPxPerZoomLevel:60,
    zoomAnimation:true,
    worldCopyJump:false,
    maxBoundsViscosity:1
}).setView([46.6,2.4],6);


streetLayer.addTo(map);


map.setMinZoom(1);
map.setMaxZoom(20);


let globeBounds=L.latLngBounds(
    [-85,-180],
    [85,180]
);


map.setMaxBounds(globeBounds);



/* ECHELLE */

L.control.scale({
    position:"bottomleft",
    metric:true,
    imperial:false,
    maxWidth:200
}).addTo(map);



/* MENU */

function toggleMenu(){

    let box=document.getElementById("menuBox");

    box.style.display=
    box.style.display==="block"
    ?"none"
    :"block";

}


function setSatellite(){

    if(map.hasLayer(streetLayer)){
        map.removeLayer(streetLayer);
    }

    satelliteLayer.addTo(map);

    document.getElementById("menuBox").style.display="none";
}



function setMapView(){

    if(map.hasLayer(satelliteLayer)){
        map.removeLayer(satelliteLayer);
    }

    streetLayer.addTo(map);

    document.getElementById("menuBox").style.display="none";
}



/* SLIDER ZOOM */

const thumb=document.getElementById("sliderThumb");
const track=document.getElementById("sliderTrack");


const MIN_ZOOM=1;
const MAX_ZOOM=20;


let dragging=false;



function updateFromSlider(y){

    let rect=track.getBoundingClientRect();

    let pos=y-rect.top;

    pos=Math.max(0,Math.min(pos,rect.height));


    let ratio=pos/rect.height;


    let zoom=
    MAX_ZOOM-(ratio*(MAX_ZOOM-MIN_ZOOM));


    map.setZoom(
        zoom,
        {
            animate:false
        }
    );

}



function syncSliderWithMap(){

    let rect=track.getBoundingClientRect();

    let zoom=map.getZoom();


    let ratio=
    (MAX_ZOOM-zoom)/
    (MAX_ZOOM-MIN_ZOOM);


    thumb.style.top=
    (ratio*rect.height)+"px";

}



thumb.addEventListener(
"mousedown",
e=>{

    dragging=true;

    e.preventDefault();

});


document.addEventListener(
"mouseup",
()=>{

    dragging=false;

});


document.addEventListener(
"mousemove",
e=>{

    if(dragging){

        updateFromSlider(e.clientY);

    }

});



thumb.addEventListener(
"touchstart",
()=>{

    dragging=true;

});


document.addEventListener(
"touchend",
()=>{

    dragging=false;

});


document.addEventListener(
"touchmove",
e=>{

    if(dragging){

        updateFromSlider(
            e.touches[0].clientY
        );

    }

});



track.addEventListener(
"click",
e=>{

    updateFromSlider(e.clientY);

});



map.on(
"zoom",
syncSliderWithMap
);


map.on(
"zoomend",
syncSliderWithMap
);


window.addEventListener(
"resize",
syncSliderWithMap
);


setTimeout(
syncSliderWithMap,
300
);
/* RECHERCHE */

let suggestionBox=document.getElementById("suggestions");
let search=document.getElementById("search");

let searchTimer;


async function searchPlace(query,zoom=16){

    let res=await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&q="
    +
    encodeURIComponent(query)
    +
    "&limit=1&accept-language=fr"
    );


    let data=await res.json();


    if(data.length){

        map.flyTo(
            [
                data[0].lat,
                data[0].lon
            ],
            zoom,
            {
                duration:1.5
            }
        );

    }

}



/* Recherche automatique */

search.addEventListener(
"input",
function(){

    clearTimeout(searchTimer);


    let query=this.value.trim();


    if(query.length<2){

        suggestionBox.innerHTML="";

        return;

    }


    searchTimer=setTimeout(async()=>{


        let res=await fetch(
        "https://nominatim.openstreetmap.org/search?format=json&q="
        +
        encodeURIComponent(query)
        +
        "&limit=5&accept-language=fr"
        );


        let data=await res.json();


        suggestionBox.innerHTML="";


        data.forEach(place=>{


            let item=document.createElement("div");


            item.className="suggestionItem";


            item.innerText=place.display_name;



            item.onclick=()=>{


                map.flyTo(
                    [
                        place.lat,
                        place.lon
                    ],
                    16,
                    {
                        duration:1.5
                    }
                );


                search.value=place.display_name;


                suggestionBox.innerHTML="";

            };


            suggestionBox.appendChild(item);


        });


    },400);


});





/* Recherche avec Entrée */

search.addEventListener(
"keydown",
function(e){

    if(e.key==="Enter"){

        let query=this.value.trim();


        if(query.length>=2){

            searchPlace(query,16);

            suggestionBox.innerHTML="";

        }

    }

});





/* MICRO */

function startVoice(){

    const SpeechRecognition=
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;


    if(!SpeechRecognition){

        alert(
        "La reconnaissance vocale n'est pas disponible"
        );

        return;

    }


    let recognition=new SpeechRecognition();


    recognition.lang="fr-FR";


    recognition.onresult=function(e){


        search.value=
        e.results[0][0].transcript;


        searchPlace(
            search.value,
            16
        );


    };


    recognition.start();

}





/* FEUX */

let markers=[];


async function loadFires(){


    clearMap();


    try{


        let res=await fetch(API_URL);


        let text=await res.text();


        let rows=text.split("\n").slice(1);



        rows.forEach(row=>{


            let cols=row.split(",");


            let lat=parseFloat(cols[0]);

            let lon=parseFloat(cols[1]);

            let bright=parseFloat(cols[2]);



            if(isNaN(lat)||isNaN(lon)){

                return;

            }



            let color=
            bright>350 ? "#ff0000" :
            bright>320 ? "#ff8800" :
            bright>300 ? "#ffd000" :
            "#00ff88";



            let marker=L.circleMarker(
                [
                    lat,
                    lon
                ],
                {

                    radius:5,

                    color:color,

                    fillColor:color,

                    fillOpacity:.85,

                    weight:1

                }
            )
            .addTo(map);



            marker.bindPopup(
            `
            🔥 Feu détecté<br>
            Latitude : ${lat}<br>
            Longitude : ${lon}<br>
            Intensité : ${bright}
            `
            );


            markers.push(marker);


        });


    }
    catch(e){

        console.log(e);

        alert(
        "Impossible de charger les feux"
        );

    }


}



function clearMap(){

    markers.forEach(
        m=>map.removeLayer(m)
    );


    markers=[];

}



</script>

</body>
</html>
